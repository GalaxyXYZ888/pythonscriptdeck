name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build and Release Plugin
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Build plugin
      run: npm run build
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create plugin package
      run: |
        cd com.nicoohagedorn.pythonscriptdeck.sdPlugin
        zip -r ../pythonscriptdeck-${{ steps.get_version.outputs.VERSION }}.streamDeckPlugin .
        cd ..
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          pythonscriptdeck-${{ steps.get_version.outputs.VERSION }}.streamDeckPlugin
        body: |
          ## PythonScriptDeck v${{ steps.get_version.outputs.VERSION }}
          
          ### Installation
          1. Download the `.streamDeckPlugin` file below
          2. Double-click to install in Stream Deck
          
          ### Changes
          See [CHANGELOG.md](CHANGELOG.md) for details.
          
          ### Requirements
          - Stream Deck software v6.0 or later
          - Python 3.x installed on your system
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

